name: CI Laravel

# Quand déclencher ce workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest  # la machine virtuelle fournie par GitHub

    steps:
      #  Récupère le code de ton dépôt
      - name: Checkout du code
        uses: actions/checkout@v4

      #  Installe PHP avec les extensions nécessaires à Laravel
      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, dom, fileinfo, mysql, sqlite3
          coverage: none

      #  Copie le fichier .env pour l'environnement de test
      - name: Préparer le fichier .env
        run: cp .env.example .env

      #  Installe les dépendances PHP via Composer
      - name: Installer les dépendances
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

        # Installer Node.js
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Installer les dépendances JS
      - name: Installer les dépendances npm
        run: npm ci

      # Construire les assets (CSS/JS) avec Vite
      - name: Builder les assets
        run: npm run build

      #  Génère la clé d'application Laravel
      - name: Générer la clé Laravel
        run: php artisan key:generate

      # Crée une base SQLite légère pour les tests (rapide, pas de config serveur)
      - name: Créer la base SQLite de test
        run: |
          mkdir -p database
          touch database/database.sqlite

      #  Lance les migrations sur cette base de test
      - name: Lancer les migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite

      #  Lance les tests
      - name: Exécuter les tests
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite